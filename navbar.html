<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUNERALnews.lk - Memorial Platform</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="../assets/fav.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

    <!-- ========== MAIN HEADER ========== -->
    <header class="main-header" id="navbar">
        <div class="top-navigation">
            <div class="nav-center-wrapper">
                <div class="d-flex justify-content-between align-items-center py-2">
                    <div class="top-left">
                        <a href="index.html" onclick="showMainPage(); return false;">Home</a>
                        <a href="service.html">Service</a>
                        <a href="pricing.html">Pricing</a>
                        <a href="contact.html">Contact Us</a>
                    </div>

                    <!-- Language Dropdown -->
                    <div class="top-right" style="position: relative;">
                        <button class="language-btn" id="langBtn">
                            <i class="bi bi-globe"></i>
                            <span id="langLabel">English</span>
                            <i class="bi bi-chevron-down"></i>
                        </button>
                        <div class="lang-dropdown-menu" id="langMenu">
                            <div class="lang-dropdown-item active" data-lang="en" data-label="English">English</div>
                            <div class="lang-dropdown-item" data-lang="ta" data-label="Tamil">Tamil</div>
                            <div class="lang-dropdown-item" data-lang="si" data-label="Sinhala">Sinhala</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-center-wrapper">
            <div class="row align-items-center g-3 py-3">
                <div class="col-12 col-lg-auto">
                    <div class="d-flex align-items-center justify-content-between">
                        <a class="logo-link" href="#" onclick="showMainPage(); return false;">
                            <img src="assets/Logo.png" alt="FuneralNews Logo" class="logo-img">
                        </a>
                        <div class="d-flex d-lg-none gap-2">
                            <button class="btn-create-mobile" data-bs-toggle="modal" data-bs-target="#createMemorialModal">
                                <i class="bi bi-plus-circle"></i> Create Funeral Notice
                            </button>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-lg">
                    <div class="d-flex flex-column flex-lg-row gap-2 align-items-lg-center">
                        <div class="flex-grow-1 position-relative">
                            <i class="bi bi-search search-icon"></i>
                            <input type="search" class="search-input" id="searchInput" placeholder="Search a person...">
                        </div>
                        <div class="d-flex gap-2 align-items-center">
                            <button class="btn-create d-none d-lg-inline-flex" data-bs-toggle="modal" data-bs-target="#createMemorialModal">
                                <i class="bi bi-plus-circle"></i> Create Funeral Notice
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

    </body>
</html>
